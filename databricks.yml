bundle:
  name: sg-building-management

workspace:
  host: https://fe-sandbox-serverless-sandbox-simtsc-new.cloud.databricks.com
  profile: fe-vm-serverless-sandbox-simtsc-new

variables:
  catalog:
    default: serverless_sandbox_simtsc_new_catalog
  schema:
    default: sg_building

sync:
  include:
    - "pipelines/**"
    - "app/**"

resources:
  jobs:
    sg_traffic_data_ingestion:
      name: "SG Traffic Data Ingestion"
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "Asia/Singapore"
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: ingest_traffic_data
          notebook_task:
            notebook_path: ${workspace.root_path}/files/pipelines/ingest_traffic_data
          environment_key: default
      tags:
        project: sg-building-management
        team: simtsc

  apps:
    sg_building_app:
      name: "sg-building-mgmt"
      description: "Singapore Building Management - 3D Map"
      source_code_path: ./app
