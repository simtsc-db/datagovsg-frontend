<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG PubSec Palantir Clone</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #cesiumContainer { width: 100%; height: 100%; }

        /* Control panel */
        #controls {
            position: absolute; top: 12px; left: 12px; z-index: 10;
            background: rgba(20, 20, 30, 0.9); border-radius: 10px;
            padding: 16px; color: #fff; min-width: 240px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #controls h2 { font-size: 13px; margin-bottom: 12px; color: #7ecfff; letter-spacing: 0.5px; }
        .toggle-group { margin-bottom: 6px; }
        .toggle-group label {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 13px; padding: 3px 0;
        }
        .toggle-group input[type="checkbox"] { accent-color: #7ecfff; }
        .badge {
            display: inline-block; padding: 2px 6px; border-radius: 4px;
            font-size: 11px; font-weight: 600; margin-left: auto;
        }
        .badge-red { background: rgba(255,80,80,0.3); color: #ff5050; }
        .badge-blue { background: rgba(80,150,255,0.3); color: #5096ff; }
        .badge-green { background: rgba(80,200,120,0.3); color: #50c878; }
        .section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 8px 0; }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #666; margin-bottom: 4px; }
        #status { font-size: 11px; color: #888; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }

        /* Popup */
        #infoPopup {
            display: none; position: absolute; z-index: 20;
            background: rgba(20, 20, 30, 0.95); border-radius: 10px;
            padding: 12px; color: #fff; max-width: 380px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #infoPopup h3 { font-size: 13px; margin-bottom: 8px; }
        #infoPopup img { width: 100%; border-radius: 6px; }
        #infoPopup .meta { font-size: 11px; color: #aaa; margin-top: 6px; line-height: 1.5; }
        #infoPopup .close-btn {
            position: absolute; top: 8px; right: 10px;
            cursor: pointer; color: #888; font-size: 16px;
        }
        #infoPopup .close-btn:hover { color: #fff; }
        .occupancy-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); margin-top: 6px; overflow: hidden; }
        .occupancy-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

        /* Stats overlay */
        #statsOverlay {
            position: absolute; bottom: 40px; right: 12px; z-index: 10;
            background: rgba(20, 20, 30, 0.9); border-radius: 10px;
            padding: 14px 18px; color: #fff; min-width: 210px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #statsOverlay h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7ecfff; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 12px; }
        .stat-row .stat-label { color: #aaa; }
        .stat-row .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
        .stat-row .stat-value.highlight { color: #7ecfff; font-size: 18px; }
        .stat-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="controls">
        <h2>SG PUBSEC PALANTIR CLONE</h2>
        <div class="section-label">LTA Traffic</div>
        <div class="toggle-group">
            <label>
                <input type="checkbox" id="toggleCameras" checked>
                Traffic Cameras
                <span class="badge badge-red" id="cameraCount">0</span>
            </label>
        </div>
        <div class="toggle-group">
            <label>
                <input type="checkbox" id="toggleTaxis" checked>
                Taxis
                <span class="badge badge-blue" id="taxiCount">0</span>
            </label>
        </div>
        <hr class="section-divider">
        <div class="section-label">HDB Housing</div>
        <div class="toggle-group">
            <label>
                <input type="checkbox" id="toggleCarparks" checked>
                Carpark Occupancy
                <span class="badge badge-green" id="carparkCount">0</span>
            </label>
        </div>
        <div id="status">Loading data...</div>
    </div>

    <div id="infoPopup">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <h3 id="popupTitle"></h3>
        <div id="popupImageWrap"></div>
        <div class="meta" id="popupMeta"></div>
        <div id="popupBar"></div>
    </div>

    <div id="statsOverlay">
        <h3>Live Statistics</h3>
        <div class="stat-row">
            <span class="stat-label">Available Taxis</span>
            <span class="stat-value highlight" id="statTaxiCount">--</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-row">
            <span class="stat-label">Active Cameras</span>
            <span class="stat-value" id="statCameraCount">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Carparks Tracked</span>
            <span class="stat-value" id="statCarparkCount">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Avg Carpark Occupancy</span>
            <span class="stat-value" id="statAvgOccupancy">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Taxi Density</span>
            <span class="stat-value" id="statDensity">--</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-row">
            <span class="stat-label">Last Updated</span>
            <span class="stat-value" id="statLastUpdated">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Data Source</span>
            <span class="stat-value">data.gov.sg</span>
        </div>
    </div>

    <script>
        const CESIUM_TOKEN = window.__CESIUM_TOKEN__ || '';
        Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false, geocoder: false, homeButton: false,
            navigationHelpButton: false, sceneModePicker: false,
            timeline: false, animation: false, fullscreenButton: false,
            selectionIndicator: false, infoBox: false,
            baseLayer: Cesium.ImageryLayer.fromProviderAsync(
                Cesium.ArcGisMapServerImageryProvider.fromBasemapType(Cesium.ArcGisBaseMapType.SATELLITE)
            ),
        });

        viewer.camera.setView({
            destination: Cesium.Rectangle.fromDegrees(103.58, 1.15, 104.10, 1.48),
        });

        async function setupTerrain() {
            try { viewer.scene.terrainProvider = await Cesium.CesiumTerrainProvider.fromIonAssetId(1); }
            catch (e) { console.warn('Terrain unavailable:', e); }
        }
        setupTerrain();

        async function addBuildings() {
            try { viewer.scene.primitives.add(await Cesium.Cesium3DTileset.fromIonAssetId(96188)); }
            catch (e) { console.warn('3D buildings unavailable:', e); }
        }
        addBuildings();

        // Data sources
        const cameraDS = new Cesium.CustomDataSource('cameras');
        const taxiDS = new Cesium.CustomDataSource('taxis');
        const carparkDS = new Cesium.CustomDataSource('carparks');
        viewer.dataSources.add(cameraDS);
        viewer.dataSources.add(taxiDS);
        viewer.dataSources.add(carparkDS);

        // Popup
        const popup = document.getElementById('infoPopup');

        function showPopup(title, titleColor, content, barHtml, screenPos) {
            document.getElementById('popupTitle').textContent = title;
            document.getElementById('popupTitle').style.color = titleColor;
            document.getElementById('popupMeta').innerHTML = content;
            document.getElementById('popupBar').innerHTML = barHtml || '';
            document.getElementById('popupImageWrap').innerHTML = '';
            popup.style.display = 'block';
            popup.style.left = Math.min(screenPos.x + 15, window.innerWidth - 400) + 'px';
            popup.style.top = Math.min(screenPos.y - 50, window.innerHeight - 300) + 'px';
        }

        function showCameraPopup(cam, screenPos) {
            document.getElementById('popupTitle').textContent = `Camera ${cam.camera_id}`;
            document.getElementById('popupTitle').style.color = '#ff5050';
            document.getElementById('popupImageWrap').innerHTML = `<img src="${cam.image_url}" style="width:100%;border-radius:6px;">`;
            document.getElementById('popupMeta').textContent = `${cam.image_width}x${cam.image_height} | ${cam.captured_at || 'N/A'}`;
            document.getElementById('popupBar').innerHTML = '';
            popup.style.display = 'block';
            popup.style.left = Math.min(screenPos.x + 15, window.innerWidth - 400) + 'px';
            popup.style.top = Math.min(screenPos.y - 50, window.innerHeight - 300) + 'px';
        }

        function closePopup() { popup.style.display = 'none'; }

        // Occupancy color: green (empty) -> yellow -> red (full)
        function occupancyColor(occ) {
            const r = Math.min(1, occ * 2);
            const g = Math.min(1, (1 - occ) * 2);
            return new Cesium.Color(r, g, 0.1, 0.85);
        }

        // Click handler
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (!Cesium.defined(picked) || !picked.id) { closePopup(); return; }

            if (picked.id._cameraData) {
                showCameraPopup(picked.id._cameraData, click.position);
            } else if (picked.id._carparkData) {
                const cp = picked.id._carparkData;
                const pct = Math.round(cp.occupancy * 100);
                const color = pct > 80 ? '#ff5050' : pct > 50 ? '#ffaa00' : '#50c878';
                showPopup(
                    `${cp.address}`, color,
                    `Carpark: ${cp.carpark_number}<br>` +
                    `Type: ${cp.car_park_type}<br>` +
                    `Available: <b>${cp.available_lots}</b> / ${cp.total_lots} lots<br>` +
                    `Free Parking: ${cp.free_parking}<br>` +
                    `Night Parking: ${cp.night_parking}<br>` +
                    `Updated: ${cp.updated_at}`,
                    `<div class="occupancy-bar"><div class="occupancy-fill" style="width:${pct}%;background:${color}"></div></div>` +
                    `<div style="font-size:11px;color:${color};margin-top:4px;text-align:right">${pct}% occupied</div>`,
                    click.position
                );
            } else {
                closePopup();
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        // Load traffic cameras
        async function loadCameras() {
            try {
                const resp = await fetch('/api/traffic-cameras');
                const data = await resp.json();
                cameraDS.entities.removeAll();
                data.cameras.forEach(cam => {
                    const entity = cameraDS.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(cam.longitude, cam.latitude, 50),
                        point: {
                            pixelSize: 10, color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE, outlineWidth: 1,
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        },
                        label: {
                            text: cam.camera_id, font: '10px sans-serif',
                            fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -14),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                            scaleByDistance: new Cesium.NearFarScalar(1000, 1.0, 50000, 0.3),
                        },
                    });
                    entity._cameraData = cam;
                });
                document.getElementById('cameraCount').textContent = data.count;
                return data.count;
            } catch (e) { console.error('Failed to load cameras:', e); return 0; }
        }

        // Load taxi locations
        async function loadTaxis() {
            try {
                const resp = await fetch('/api/taxi-locations');
                const data = await resp.json();
                taxiDS.entities.removeAll();
                data.taxis.forEach(taxi => {
                    taxiDS.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(taxi.longitude, taxi.latitude, 5),
                        point: {
                            pixelSize: 8, color: Cesium.Color.fromCssColorString('#4a90ff'),
                            outlineColor: Cesium.Color.fromCssColorString('#1a5acc'), outlineWidth: 1,
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                            scaleByDistance: new Cesium.NearFarScalar(500, 1.2, 50000, 0.4),
                        },
                    });
                });
                document.getElementById('taxiCount').textContent = data.count;
                return data.count;
            } catch (e) { console.error('Failed to load taxis:', e); return 0; }
        }

        // Load carpark availability
        async function loadCarparks() {
            try {
                const resp = await fetch('/api/carparks');
                const data = await resp.json();
                carparkDS.entities.removeAll();
                data.carparks.forEach(cp => {
                    const color = occupancyColor(cp.occupancy);
                    const height = 20 + cp.occupancy * 80; // 20m (empty) to 100m (full)
                    const entity = carparkDS.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(cp.longitude, cp.latitude),
                        cylinder: {
                            length: height,
                            topRadius: 25,
                            bottomRadius: 25,
                            material: color,
                            outline: false,
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        },
                    });
                    entity._carparkData = cp;
                });
                document.getElementById('carparkCount').textContent = data.count;
                return data;
            } catch (e) { console.error('Failed to load carparks:', e); return { count: 0, carparks: [] }; }
        }

        // Toggle visibility
        document.getElementById('toggleCameras').addEventListener('change', function () { cameraDS.show = this.checked; });
        document.getElementById('toggleTaxis').addEventListener('change', function () { taxiDS.show = this.checked; });
        document.getElementById('toggleCarparks').addEventListener('change', function () { carparkDS.show = this.checked; });

        // Update stats
        function updateStats(camCount, taxiCount, carparkData) {
            document.getElementById('statTaxiCount').textContent = taxiCount.toLocaleString();
            document.getElementById('statCameraCount').textContent = camCount;
            document.getElementById('statCarparkCount').textContent = carparkData.count;
            document.getElementById('statDensity').textContent = `${(taxiCount / 730).toFixed(1)}/km\u00B2`;

            if (carparkData.carparks && carparkData.carparks.length > 0) {
                const avgOcc = carparkData.carparks.reduce((s, c) => s + c.occupancy, 0) / carparkData.carparks.length;
                document.getElementById('statAvgOccupancy').textContent = `${Math.round(avgOcc * 100)}%`;
            }
            document.getElementById('statLastUpdated').textContent = new Date().toLocaleTimeString('en-SG', { hour12: false });
        }

        // Init
        async function init() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Loading...';
            const [camCount, taxiCount, carparkData] = await Promise.all([
                loadCameras(), loadTaxis(), loadCarparks()
            ]);
            statusEl.textContent = `${camCount} cameras, ${taxiCount} taxis, ${carparkData.count} carparks`;
            updateStats(camCount, taxiCount, carparkData);

            setInterval(async () => {
                const [c, t, cp] = await Promise.all([loadCameras(), loadTaxis(), loadCarparks()]);
                statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
                updateStats(c, t, cp);
            }, 30000);
        }

        init();
    </script>
</body>
</html>
