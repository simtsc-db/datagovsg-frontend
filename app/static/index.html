<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singapore Building Management</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #cesiumContainer { width: 100%; height: 100%; }

        /* Control panel */
        #controls {
            position: absolute; top: 12px; left: 12px; z-index: 10;
            background: rgba(20, 20, 30, 0.9); border-radius: 10px;
            padding: 16px; color: #fff; min-width: 220px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #controls h2 { font-size: 14px; margin-bottom: 12px; color: #7ecfff; letter-spacing: 0.5px; }
        .toggle-group { margin-bottom: 8px; }
        .toggle-group label {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 13px; padding: 4px 0;
        }
        .toggle-group input[type="checkbox"] { accent-color: #7ecfff; }
        .badge {
            display: inline-block; padding: 2px 6px; border-radius: 4px;
            font-size: 11px; font-weight: 600; margin-left: auto;
        }
        .badge-red { background: rgba(255,80,80,0.3); color: #ff5050; }
        .badge-blue { background: rgba(80,150,255,0.3); color: #5096ff; }
        #status { font-size: 11px; color: #888; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }

        /* Camera popup */
        #cameraPopup {
            display: none; position: absolute; z-index: 20;
            background: rgba(20, 20, 30, 0.95); border-radius: 10px;
            padding: 12px; color: #fff; max-width: 360px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #cameraPopup h3 { font-size: 13px; color: #ff5050; margin-bottom: 8px; }
        #cameraPopup img { width: 100%; border-radius: 6px; }
        #cameraPopup .meta { font-size: 11px; color: #aaa; margin-top: 6px; }
        #cameraPopup .close-btn {
            position: absolute; top: 8px; right: 10px;
            cursor: pointer; color: #888; font-size: 16px;
        }
        #cameraPopup .close-btn:hover { color: #fff; }

        /* Stats overlay */
        #statsOverlay {
            position: absolute; bottom: 40px; right: 12px; z-index: 10;
            background: rgba(20, 20, 30, 0.9); border-radius: 10px;
            padding: 14px 18px; color: #fff; min-width: 200px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        #statsOverlay h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7ecfff; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
        .stat-row .stat-label { color: #aaa; }
        .stat-row .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
        .stat-row .stat-value.highlight { color: #7ecfff; font-size: 18px; }
        .stat-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 6px 0; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="controls">
        <h2>SG BUILDING MGMT</h2>
        <div class="toggle-group">
            <label>
                <input type="checkbox" id="toggleCameras" checked>
                Traffic Cameras
                <span class="badge badge-red" id="cameraCount">0</span>
            </label>
        </div>
        <div class="toggle-group">
            <label>
                <input type="checkbox" id="toggleTaxis" checked>
                Taxis
                <span class="badge badge-blue" id="taxiCount">0</span>
            </label>
        </div>
        <div id="status">Loading data...</div>
    </div>

    <div id="cameraPopup">
        <span class="close-btn" onclick="closeCameraPopup()">&times;</span>
        <h3 id="popupTitle"></h3>
        <img id="popupImage" src="" alt="Traffic camera image">
        <div class="meta" id="popupMeta"></div>
    </div>

    <div id="statsOverlay">
        <h3>Live Statistics</h3>
        <div class="stat-row">
            <span class="stat-label">Available Taxis</span>
            <span class="stat-value highlight" id="statTaxiCount">--</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-row">
            <span class="stat-label">Active Cameras</span>
            <span class="stat-value" id="statCameraCount">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Taxi Density</span>
            <span class="stat-value" id="statDensity">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Coverage Area</span>
            <span class="stat-value" id="statCoverage">~730 km&sup2;</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-row">
            <span class="stat-label">Last Updated</span>
            <span class="stat-value" id="statLastUpdated">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Data Source</span>
            <span class="stat-value">data.gov.sg</span>
        </div>
    </div>

    <script>
        // Cesium Ion access token from secrets (injected at build or via env)
        const CESIUM_TOKEN = window.__CESIUM_TOKEN__ || '';

        // Initialize Cesium
        Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            navigationHelpButton: false,
            sceneModePicker: false,
            timeline: false,
            animation: false,
            fullscreenButton: false,
            selectionIndicator: false,
            infoBox: false,
            baseLayer: Cesium.ImageryLayer.fromProviderAsync(
                Cesium.ArcGisMapServerImageryProvider.fromBasemapType(
                    Cesium.ArcGisBaseMapType.SATELLITE
                )
            ),
        });

        // Set camera to show all of Singapore immediately
        // Singapore bounds: approx 103.6 to 104.1 lon, 1.15 to 1.48 lat
        viewer.camera.setView({
            destination: Cesium.Rectangle.fromDegrees(103.58, 1.15, 104.10, 1.48),
        });

        // Add Cesium World Terrain if Ion token is available
        async function setupTerrain() {
            try {
                const terrain = await Cesium.CesiumTerrainProvider.fromIonAssetId(1);
                viewer.scene.terrainProvider = terrain;
            } catch (e) {
                console.warn('Could not load Cesium World Terrain:', e);
            }
        }
        setupTerrain();

        // Enable 3D buildings from Cesium Ion (OSM Buildings)
        async function addBuildings() {
            try {
                const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(96188);
                viewer.scene.primitives.add(tileset);
            } catch (e) {
                console.warn('Could not load 3D buildings:', e);
            }
        }
        addBuildings();

        // Data sources
        const cameraDataSource = new Cesium.CustomDataSource('cameras');
        const taxiDataSource = new Cesium.CustomDataSource('taxis');
        viewer.dataSources.add(cameraDataSource);
        viewer.dataSources.add(taxiDataSource);

        // Camera popup
        const popup = document.getElementById('cameraPopup');

        function showCameraPopup(camera, screenPos) {
            document.getElementById('popupTitle').textContent = `Camera ${camera.camera_id}`;
            document.getElementById('popupImage').src = camera.image_url;
            document.getElementById('popupMeta').textContent =
                `${camera.image_width}x${camera.image_height} | ${camera.captured_at || 'N/A'}`;

            popup.style.display = 'block';
            popup.style.left = Math.min(screenPos.x + 15, window.innerWidth - 380) + 'px';
            popup.style.top = Math.min(screenPos.y - 50, window.innerHeight - 300) + 'px';
        }

        function closeCameraPopup() {
            popup.style.display = 'none';
        }

        // Click handler
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && picked.id && picked.id._cameraData) {
                showCameraPopup(picked.id._cameraData, click.position);
            } else {
                closeCameraPopup();
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        // Load traffic cameras
        async function loadCameras() {
            try {
                const resp = await fetch('/api/traffic-cameras');
                const data = await resp.json();
                cameraDataSource.entities.removeAll();

                data.cameras.forEach(cam => {
                    const entity = cameraDataSource.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(cam.longitude, cam.latitude, 50),
                        point: {
                            pixelSize: 10,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 1,
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        },
                        label: {
                            text: cam.camera_id,
                            font: '10px sans-serif',
                            fillColor: Cesium.Color.WHITE,
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -14),
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                            scaleByDistance: new Cesium.NearFarScalar(1000, 1.0, 50000, 0.3),
                        },
                    });
                    entity._cameraData = cam;
                });

                document.getElementById('cameraCount').textContent = data.count;
                return data.count;
            } catch (e) {
                console.error('Failed to load cameras:', e);
                return 0;
            }
        }

        // Load taxi locations
        async function loadTaxis() {
            try {
                const resp = await fetch('/api/taxi-locations');
                const data = await resp.json();
                taxiDataSource.entities.removeAll();

                const taxis = data.taxis;
                for (let i = 0; i < taxis.length; i++) {
                    const taxi = taxis[i];
                    taxiDataSource.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(taxi.longitude, taxi.latitude, 5),
                        point: {
                            pixelSize: 8,
                            color: Cesium.Color.fromCssColorString('#4a90ff'),
                            outlineColor: Cesium.Color.fromCssColorString('#1a5acc'),
                            outlineWidth: 1,
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                            scaleByDistance: new Cesium.NearFarScalar(500, 1.2, 50000, 0.4),
                        },
                    });
                }

                document.getElementById('taxiCount').textContent = data.count;
                return data.count;
            } catch (e) {
                console.error('Failed to load taxis:', e);
                return 0;
            }
        }

        // Toggle visibility
        document.getElementById('toggleCameras').addEventListener('change', function () {
            cameraDataSource.show = this.checked;
        });
        document.getElementById('toggleTaxis').addEventListener('change', function () {
            taxiDataSource.show = this.checked;
        });

        // Update stats overlay
        function updateStats(camCount, taxiCount) {
            document.getElementById('statTaxiCount').textContent = taxiCount.toLocaleString();
            document.getElementById('statCameraCount').textContent = camCount;
            const density = (taxiCount / 730).toFixed(1);
            document.getElementById('statDensity').textContent = `${density}/km\u00B2`;
            document.getElementById('statLastUpdated').textContent = new Date().toLocaleTimeString('en-SG', { hour12: false });
        }

        // Initial load
        async function init() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Loading cameras...';
            const camCount = await loadCameras();
            statusEl.textContent = 'Loading taxis...';
            const taxiCount = await loadTaxis();
            statusEl.textContent = `Loaded ${camCount} cameras, ${taxiCount} taxis`;
            updateStats(camCount, taxiCount);

            // Auto-refresh every 30 seconds
            setInterval(async () => {
                const c = await loadCameras();
                const t = await loadTaxis();
                statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
                updateStats(c, t);
            }, 30000);
        }

        init();
    </script>
</body>
</html>
